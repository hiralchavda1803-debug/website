<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div class="relative max-w-5xl mx-auto">
  <!-- Scroll Container -->
  <div id="slider" class="flex overflow-x-auto scroll-smooth gap-4">
    <div class="min-w-full">
      <img src="image1.jpg" class="rounded-2xl w-full">
    </div>

    <div class="min-w-full">
      <img src="image2.jpg" class="rounded-2xl w-full">
    </div>
  </div>

  <!-- Left Button -->
  <button onclick="scrollLeft()"
    class="absolute left-[-20px] top-1/2 -translate-y-1/2 bg-pink-200 hover:bg-red-400 p-3 rounded-full transition duration-300">
    ←
  </button>

  <!-- Right Button -->
  <button onclick="scrollRight()"class="absolute right-[-20px] top-1/2 -translate-y-1/2 bg-red-500 hover:bg-red-700 text-white p-3 rounded-full transition duration-300">
    →
  </button>

</div>
</body>
</html>
